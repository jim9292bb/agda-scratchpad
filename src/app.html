<!DOCTYPE html>
<html class="quiet-dark">
  <head>
    <meta charset="utf-8">
    <title>Agda REPL 2025</title>
    <link rel="icon" href="%sveltekit.assets%/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <style>
      body, html { box-sizing: border-box; width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden }
      *, *:before, *:after { box-sizing: inherit; }
      body > div:first-child { display: contents; }
    </style>
    <link rel="stylesheet" href="../node_modules/@quietui/quiet/dist/themes/quiet.css">
    <link rel="stylesheet" href="../node_modules/@quietui/quiet/dist/themes/utilities.css">
    <link rel="stylesheet" href="%sveltekit.assets%/julia-mono.css">
    <script src="./coi-serviceworker.js"></script>
    <script>
      'use strict'
      if (window.matchMedia) {
        window.matchMedia('(prefers-color-scheme: dark)').onchange = function(evt) {
          console.log(evt)
          document.documentElement.classList.toggle('quiet-dark', evt.matches)
        }
      }
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div>%sveltekit.body%</div>
  </body>
</html>
