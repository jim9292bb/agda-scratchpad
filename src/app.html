<!DOCTYPE html>
<html class="quiet-dark quiet-cloak">
  <head>
    <meta charset="utf-8">
    <title>Agda Scratchpad IDE</title>
    <link rel="icon" href="%sveltekit.assets%/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <style>
      body, html { box-sizing: border-box; width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden }
      *, *:before, *:after { box-sizing: inherit; }
      body > div:first-child { display: contents; }
    </style>
    <link rel="stylesheet" href="%sveltekit.assets%/julia-mono.css">
    <script src="./coi-serviceworker.js"></script>
    <script>
      'use strict'
      ;(() => {
        const toggleClass = z => document.documentElement.classList.toggle('quiet-dark', z)
        if (window.matchMedia) {
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)')
          toggleClass(prefersDark.matches)
          prefersDark.onchange = evt => toggleClass(evt.matches)
        }
      })()
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div>%sveltekit.body%</div>
    <noscript>It is 2025. This site requires JavaScript.</noscript>
  </body>
</html>
